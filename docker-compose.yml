services:
  db:
    image: postgres:16-alpine
    container_name: finances-db
    environment:
      POSTGRES_DB: finances
      POSTGRES_USER: finances
      POSTGRES_PASSWORD: finances
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: finances-app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://finances:finances@db:5432/finances
    ports:
      - "8501:8501"
    volumes:
      - .:/app

volumes:
  postgres_data:
