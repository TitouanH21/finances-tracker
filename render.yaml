services:
  - type: web
    name: finances-app
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finances-db
          property: connectionString

  - type: postgres
    name: finances-db
    plan: free
    databaseName: finances
